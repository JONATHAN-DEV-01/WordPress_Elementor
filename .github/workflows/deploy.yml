name: Deploy Portfolio
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Acesso SSH e Git Pull
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Acessa a pasta do site
            cd /var/www/136.248.68.173/htdocs/wp-content
            # Puxa o código atualizado
            git pull origin main
            # Corrige permissões para o Nginx
            sudo chown -R www-data:www-data /var/www/136.248.68.173/htdocs/wp-content
